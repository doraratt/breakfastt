{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakFast | Login</title>
  <link rel="stylesheet" href="{% static 'css/ls.css' %}">
  <link rel="icon" type="image/png" href="{% static 'images/bficon.png' %}">
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img src="{% static 'images/ategurl.png' %}" alt="Fitness Model">
    </div>
    <div class="login-section">
      <div class="logo">
        <h1>BreakFast</h1><br>
        <!--<img src="static/images/bf_dark.png" alt="BreakFast Dark Logo">-->
      </div>
      <h2>Hello, <br>welcome!</h2>
    <form method="post" action="{% url 'login' %}">  <!-- Add method and CSRF token -->
      {% csrf_token %}

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>  

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>  

      <!-- <div class="remember-me">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember Me!</label>
      </div> -->

      <br><br>
      <button type="submit">Log In</button>
    </form>
    <div class="sign-up">
      <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
    {% if messages %} 
        <p style="color:red;">
          {% for message in messages %}
            {{ message }}
          {% endfor %}   <!--displays an error message if login fails-->                                
    {% endif %}
    </div>
  </div>
</body>
</html>
