{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information</title>
    <link rel="stylesheet" href="{% static 'css/personalinfo.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="{% static 'images/bficon.png' %}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <a href="{% url 'me' %}" class="back-button">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <h2>Account Details</h2><br>
            <ul>
                <li class="active">Personal Information</li><br>
                <li><a href="{% url 'accountinfo' %}">Account Information</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h2>Personal Information</h2>
            <div class="profile">
                <label for="profile-pic-input">
                    <div class="profile-pic" id="profile-pic">
                        <span class="placeholder-icon">+</span>
                    </div>
                </label>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
            </div>
            <form>
                <div class="form-group">
                    <label for="first-name">First name</label>
                    <input type="text" id="first-name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Last name</label>
                    <input type="text" id="last-name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="contact">Contact number</label>
                    <input type="tel" id="contact" required>
                </div>
                <div class="buttons">
                    <a href="{% url 'landing' %}">
                        <button type="button" class="delete">Sign Out</button>
                    </a>
                    <button type="submit" class="update">Update</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        const profilePicInput = document.getElementById('profile-pic-input');
        const profilePic = document.getElementById('profile-pic');

        profilePicInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    profilePic.style.backgroundImage = `url(${e.target.result})`;
                    profilePic.textContent = ''; // Remove the placeholder text
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('signout-button').addEventListener('click', function() {
        window.location.href = 'landing/';  // Change the URL if needed
         });
    </script>
</body>
</html>
