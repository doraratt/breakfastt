{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Information</title>
    <link rel="stylesheet" href="{% static 'css/accountinfo.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="{% static 'images/bficon.png' %}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <a href="{% url 'personalinfo' %}" class="back-button">
                <i class="fas fa-arrow-left small-arrow"></i> Back
            </a>
            <h2>Account Details</h2><br>
            <ul>
                <li><a href="{% url 'personalinfo' %}">Personal Information</a></li><br>
                <li class="active">Account Information</li>        
            </ul>
        </div>
        
        <div class="main-content">
            <h2>Account Information</h2>
            <form>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="buttons">
                    <button type="button" class="delete">Delete Account</button>
                    <button type="submit" class="update">Update</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
