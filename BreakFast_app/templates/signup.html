{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakFast - Sign-up</title>
  <link rel="stylesheet" href="{% static 'css/ls.css' %}">
  <link rel="icon" type="image/png" href="{% static 'images/bficon.png' %}">
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img src="{% static 'images/ategurl.png' %}" alt="Fitness Model">
    </div>
    <div class="login-section">
    <div class="lgs">
        <h2>Let's get started...</h2>
    </div>
    <br>
    <!-- templates/signup.html -->

    <form method="post">  <!-- Use method POST -->
        {% csrf_token %}  <!-- Include CSRF token for security -->

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>  <!-- Add name attribute -->

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>  <!-- Add name attribute -->

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>  <!-- Add name attribute -->

        <br><br>
        <button type="submit">Create Account</button>  <!-- Submit button -->

        {% if form.errors %}  <!-- Display any form errors -->
            <ul>
            {% for field, errors in form.errors.items %}
                <li>{{ field }}: {{ errors|join:", " }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    </form>
    <div class="sign-up">
        <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
    </div>

    </div>
  </div>
</body>
</html>
